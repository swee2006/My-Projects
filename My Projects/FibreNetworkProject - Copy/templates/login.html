<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nila Cable Fiber Network - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated moon */
        .moon {
            position: fixed;
            top: 50px;
            right: 80px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 35% 35%, #fff9e6, #f0e68c);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.3), inset -20px -20px 40px rgba(0, 0, 0, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        .moon::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #d4af37;
            border-radius: 50%;
            top: 30px;
            left: 35px;
            opacity: 0.6;
        }

        .moon::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #d4af37;
            border-radius: 50%;
            top: 70px;
            left: 60px;
            opacity: 0.5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Stars animation */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: rgba(20, 20, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(102, 126, 234, 0.2);
            overflow: hidden;
            border: 1px solid rgba(102, 126, 234, 0.3);
            z-index: 10;
            animation: slideInUp 0.8s ease;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-section {
            flex: 1;
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid rgba(102, 126, 234, 0.2);
        }

        .logo-box {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box img {
            width: 120%;
            height: 120%;
            object-fit: cover;
            object-position: center;
            border-radius: 0;
        }

        .brand-title {
            font-size: 26px;
            font-weight: 700;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin-top: 8px;
            max-width: 280px;
            line-height: 1.5;
        }

        .left-section p {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
            animation: fadeIn 1.5s ease;
        }

        .right-section {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeInRight 1s ease;
        }

        .right-section h2 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .right-section p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 600;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; }
            .left-section { border-right: none; border-bottom: 1px solid rgba(102, 126, 234, 0.2); }
            .moon { width: 80px; height: 80px; top: 30px; right: 30px; }
        }
    </style>
</head>

<body>
    <!-- Stars background -->
    <div class="stars" id="starsContainer"></div>

    <!-- Floating moon -->
    <div class="moon"></div>

    <!-- Login container -->
    <div class="login-container">
        <!-- Left Section -->
        <div class="left-section">
            <div class="logo-box">
                <img src="/static/nila_logo.png" alt="Nila Cable Fiber Networks logo">
            </div>
            <div class="brand-title">Customer Management</div>
            <div class="brand-subtitle">Payment Tracking System</div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <h2>Welcome Back!</h2>
            <p>Please login to your account</p>

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script>
        // Generate random stars
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
