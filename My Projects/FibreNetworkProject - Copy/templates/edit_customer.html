<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - Nila Cable Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        header h1 { font-size: 24px; }

        .container {
            display: flex;
            min-height: calc(100vh - 90px);
        }

        .sidebar {
            width: 250px;
            background: #1a1f2e;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #888;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-left-color: #667eea;
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .page-header h2 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-card {
            background: linear-gradient(135deg, #1a1f2e 0%, #25293b 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .form-group select option {
            background: #1a1f2e;
            color: #fff;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .btn-cancel:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .btn-delete {
            flex: 1;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        input[type="hidden"] {
            display: none;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; display: flex; overflow-x: auto; }
            .main-content { padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <h1>NILA CABLE FIBRE NETWORKS</h1>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">Logout</button>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="nav-item" onclick="navigateTo('/dashboard')">
                <span>📊</span>
                <span>Dashboard</span>
            </div>
            <div class="nav-item active" onclick="navigateTo('/customers')">
                <span>👥</span>
                <span>Customers</span>
            </div>
            <div class="nav-item" onclick="navigateTo('/payments')">
                <span>💳</span>
                <span>Payments</span>
            </div>
            <div class="nav-item" onclick="navigateTo('/reports')">
                <span>📈</span>
                <span>Reports</span>
            </div>
            <div class="nav-item" onclick="navigateTo('/settings')">
                <span>⚙️</span>
                <span>Settings</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h2>Edit Customer #{{ customer['id'] }}</h2>
            </div>

            <div class="form-card">
                {% if error %}
                <div class="error-message">⚠️ {{ error }}</div>
                {% endif %}

                <form method="POST">
                    <input type="hidden" name="customer_id" value="{{ customer['id'] }}">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="box_id">Box ID</label>
                            <input type="text" id="box_id" name="box_id" value="{{ customer['box_id'] }}" required>
                        </div>

                        <div class="form-group">
                            <label for="name">Customer Name</label>
                            <input type="text" id="name" name="name" value="{{ customer['name'] }}" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" value="{{ customer['phone'] }}" required>
                        </div>

                        <div class="form-group">
                            <label for="subscription">Monthly Subscription (₹)</label>
                            <input type="number" id="subscription" name="subscription" value="{{ customer['subscription'] }}" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="connection_id">Connection ID</label>
                            <input type="text" id="connection_id" name="connection_id" value="{{ customer.get('connection_id','') }}">
                        </div>

                        <div class="form-group">
                            <label for="plan_amount">Plan Amount (₹)</label>
                            <input type="number" id="plan_amount" name="plan_amount" value="{{ customer.get('plan_amount','') }}" step="0.01">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="upi_id">UPI ID</label>
                        <input type="text" id="upi_id" name="upi_id" value="{{ customer.get('upi_id','') }}">
                    </div>

                    <div class="form-group">
                        <label for="status">Connection Status</label>
                        <select id="status" name="status" required>
                            <option value="active" {% if customer['status'] == 'active' %}selected{% endif %}>Active</option>
                            <option value="inactive" {% if customer['status'] == 'inactive' %}selected{% endif %}>Inactive</option>
                            <option value="suspended" {% if customer['status'] == 'suspended' %}selected{% endif %}>Suspended</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-submit">Update Customer</button>
                        <button type="button" class="btn btn-cancel" onclick="navigateTo('/customers')">Cancel</button>
                        <button type="button" class="btn btn-delete" data-customer-id="{{ customer['id'] }}" onclick="deleteCustomerData(this)">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.location.href = page;
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/';
            }
        }

        function deleteCustomer(customerId) {
            if (confirm('Are you sure you want to delete this customer? This action cannot be undone.')) {
                window.location.href = '/delete-customer/' + customerId;
            }
        }

        function deleteCustomerData(element) {
            const customerId = element.getAttribute('data-customer-id');
            if (confirm('Are you sure you want to delete this customer? This action cannot be undone.')) {
                window.location.href = '/delete-customer/' + customerId;
            }
        }
    </script>
</body>
</html>
