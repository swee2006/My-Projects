<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Payment - Nila Cable Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        header h1 { font-size: 24px; }
        .container { display: flex; min-height: calc(100vh - 90px); }
        .sidebar {
            width: 250px;
            background: #1a1f2e;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #888;
            transition: all 0.3s;
            border-left: 4x solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-left-color: #667eea;
        }
        .main-content { flex: 1; padding: 30px; }
        .page-header h2 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 700;
        }
        .form-card {
            background: linear-gradient(135deg, #1a1f2e 0%, #25293b 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input::placeholder { color: #666; }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-cancel { background: rgba(102, 126, 234, 0.2); color: #667eea; border: 2px solid rgba(102, 126, 234, 0.3); }
        .error-message { background: rgba(239, 68, 68, 0.2); border:1px solid rgba(239,68,68,0.5); color:#ef4444; padding:12px 15px; border-radius:8px; margin-bottom:20px; font-size:13px; }
        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; display: flex; overflow-x: auto; } .main-content { padding: 20px; } }
    </style>
</head>
<body>
    <header>
        <h1>NILA CABLE FIBRE NETWORKS</h1>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">Logout</button>
    </header>
    <div class="container">
        <div class="sidebar">
            <div class="nav-item" onclick="navigateTo('/dashboard')"><span>📊</span><span>Dashboard</span></div>
            <div class="nav-item" onclick="navigateTo('/customers')"><span>👥</span><span>Customers</span></div>
            <div class="nav-item active" onclick="navigateTo('/payments')"><span>💳</span><span>Payments</span></div>
            <div class="nav-item" onclick="navigateTo('/reports')"><span>📈</span><span>Reports</span></div>
            <div class="nav-item" onclick="navigateTo('/settings')"><span>⚙️</span><span>Settings</span></div>
        </div>
        <div class="main-content">
            <div class="page-header"><h2>Record New Payment</h2></div>
            <div class="form-card">
                {% if error %}<div class="error-message">⚠️ {{ error }}</div>{% endif %}
                <form method="POST">
                    <div class="form-group">
                        <label for="txn_id">Transaction ID</label>
                        <input type="text" id="txn_id" name="txn_id" required placeholder="e.g. TXN12345">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" required placeholder="e.g. 9842208262">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required value="{{ today }}">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-submit">Save Payment</button>
                        <button type="button" class="btn btn-cancel" onclick="navigateTo('/payments')">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function navigateTo(page) { window.location.href = page; }
        function logout() { if (confirm('Are you sure you want to logout?')) window.location.href = '/'; }
    </script>
</body>
</html>
