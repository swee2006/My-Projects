<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Statement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        header h1 { font-size: 24px; }
        .container { display: flex; min-height: calc(100vh - 90px); }
        .sidebar {
            width: 250px;
            background: #1a1f2e;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #888;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-left-color: #667eea;
        }
        .main-content { flex: 1; padding: 30px; }
        .page-header h2 {
            font-size: 32px;
            color: white;
            margin-bottom: 20px;
        }
        .card {
            background: #1a1f2e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="file"], .btn-submit {
            width: 100%;
        }
        input[type="file"] {
            padding: 12px;
            background: #111827;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
        }
        .btn-submit {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #10b981;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .alert {
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 14px;
        }
        .alert.error { background: rgba(239,68,68,0.15); color: #ef4444; }
        .alert.success { background: rgba(16,185,129,0.15); color: #10b981; }
    </style>
</head>
<body>
    <header>
        <h1>NILA CABLE FIBRE NETWORKS</h1>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">Logout</button>
    </header>
    <div class="container">
        <div class="sidebar">
            <div class="nav-item" onclick="navigateTo('/dashboard')"><span>📊</span><span>Dashboard</span></div>
            <div class="nav-item" onclick="navigateTo('/customers')"><span>👥</span><span>Customers</span></div>
            <div class="nav-item" onclick="navigateTo('/payments')"><span>💳</span><span>Payments</span></div>
            <div class="nav-item" onclick="navigateTo('/reports')"><span>📈</span><span>Reports</span></div>
            <div class="nav-item" onclick="navigateTo('/settings')"><span>⚙️</span><span>Settings</span></div>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h2>Upload Statement</h2>
            </div>
            <div class="card">
                <form action="/upload_statement" method="POST" enctype="multipart/form-data">
                    <div class="field">
                        <label for="statement">Bank statement (CSV, TXT, or PDF)</label>
                        <input type="file" name="statement" id="statement" accept=".csv,.txt,.pdf" required>
                    </div>
                    <div class="field">
                        <label for="pdf_password">PDF password (only if the PDF is encrypted)</label>
                        <input type="text" name="pdf_password" id="pdf_password" placeholder="Leave empty if not encrypted">
                    </div>
                    <div class="field">
                        <label style="text-transform:none;letter-spacing:0;">OCR fallback (only if PDF is scanned)</label>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <input type="checkbox" id="use_ocr" name="use_ocr">
                            <label for="use_ocr" style="margin:0;text-transform:none;letter-spacing:0;">Enable OCR if text extraction finds nothing</label>
                        </div>
                        <p class="note" style="margin-top:8px;color:#aaa;font-size:13px;">
                            If your PDF is scanned (image-only), OCR is required. Otherwise, password unlock + text extraction is enough.
                        </p>
                    </div>
                    <button type="submit" class="btn-submit">Parse and queue</button>
                </form>
                {% if error %}
                <div class="alert error">{{ error }}</div>
                {% endif %}
                {% if success %}
                <div class="alert success">{{ success }}</div>
                {% endif %}
            </div>
        </div>
    </div>
    <script>
        function navigateTo(page) { window.location.href = page; }
        function logout() { if (confirm('Are you sure you want to logout?')) window.location.href = '/'; }
    </script>
</body>
</html>
