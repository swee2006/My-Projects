<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Nila Cable Network</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f1419;color:#e0e0e0;}
        header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
        header h1{font-size:24px;}
        .container{display:flex;min-height:calc(100vh-90px);}
        .sidebar{width:250px;background:#1a1f2e;padding:20px 0;box-shadow:2px 0 10px rgba(0,0,0,0.5);}
        .nav-item{padding:15px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;color:#888;transition:all 0.3s;border-left:4px solid transparent;}
        .nav-item:hover{background:rgba(102,126,234,0.1);color:#667eea;}
        .nav-item.active{background:rgba(102,126,234,0.15);color:#667eea;border-left-color:#667eea;}
        .main-content{flex:1;padding:30px;}
        .page-header h2{font-size:32px;color:#fff;margin-bottom:30px;font-weight:700;}
        .settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:24px;}
        .panel{background:#1a1f2e;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px;box-shadow:0 4px 15px rgba(0,0,0,0.35);}
        .panel h3{margin-bottom:12px;font-size:20px;color:#fff;}
        .field{margin-bottom:16px;}
        .field label{display:block;color:#aaa;font-size:13px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
        .field input[type="text"], .field input[type="email"], .field select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;}
        .actions{display:flex;gap:12px;margin-top:10px;}
        .button{padding:10px 18px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:transform 0.2s;}
        .button.save{background:#10b981;color:#fff;}
        .button.cancel{background:#555;color:#fff;}
        .switch{display:flex;align-items:center;gap:10px;font-size:14px;color:#ddd;}
        .status-chip{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(16,185,129,0.2);color:#10b981;font-size:12px;font-weight:600;}
        .note{font-size:14px;color:#aaa;margin-top:10px;}
        @media(max-width:768px){.container{flex-direction:column;}.sidebar{width:100%;display:flex;overflow-x:auto;}.main-content{padding:20px;}}
    </style>
</head>
<body>
    <header>
        <h1>NILA CABLE FIBRE NETWORKS</h1>
        <button onclick="logout()" style="background:rgba(255,255,255,0.2);color:white;border:2px solid white;padding:8px 20px;border-radius:5px;cursor:pointer;font-weight:600;">Logout</button>
    </header>
    <div class="container">
        <div class="sidebar">
            <div class="nav-item" onclick="navigateTo('/dashboard')">📊 Dashboard</div>
            <div class="nav-item" onclick="navigateTo('/customers')">👥 Customers</div>
            <div class="nav-item" onclick="navigateTo('/payments')">💳 Payments</div>
            <div class="nav-item" onclick="navigateTo('/reports')">📈 Reports</div>
            <div class="nav-item active">⚙️ Settings</div>
        </div>
        <div class="main-content">
            <div class="page-header"><h2>Settings</h2></div>
            <div class="settings-grid">
                <div class="panel">
                    <h3>Admin Controls</h3>
                    <div class="field">
                        <label for="admin_email">Admin Email</label>
                        <input type="email" id="admin_email" placeholder="admin@fibernet.local">
                    </div>
                    <div class="field">
                        <label for="support_contact">Support Line</label>
                        <input type="text" id="support_contact" placeholder="+91 97654 32109">
                    </div>
                    <div class="field">
                        <label for="theme_select">Dashboard Theme</label>
                        <select id="theme_select">
                            <option value="neon">Neon Blue</option>
                            <option value="calm">Calm Teal</option>
                            <option value="night">Night Mode</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button class="button save" onclick="showToast('settings')">Save Settings</button>
                        <button class="button cancel" onclick="resetSettings()">Reset</button>
                    </div>
                    <p class="note">Changes are cosmetic for now; they can be wired to backend logic in the next sprint.</p>
                </div>
                <div class="panel">
                    <h3>Automation & Alerts</h3>
                    <div class="field">
                        <label>Auto-report delivery</label>
                        <div class="switch">
                            <input type="checkbox" id="auto_report" checked>
                            <label for="auto_report">Send daily recap to managers</label>
                        </div>
                    </div>
                    <div class="field">
                        <label>Collection Alert Threshold</label>
                        <input type="text" id="threshold" placeholder="₹ 80,000">
                    </div>
                    <div class="status-chip">Next scan: 6:00 AM</div>
                    <div class="actions" style="margin-top:20px;">
                        <button class="button save" onclick="showToast('automation')">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function navigateTo(page){window.location.href=page;}
        function logout(){if(confirm('Are you sure you want to logout?'))window.location.href='/';}
        function showToast(type){
            if(type === 'settings'){
                alert('Settings saved. Restart the dashboard to apply theme preview.');
            } else {
                alert('Automation options updated.');
            }
        }
        function resetSettings(){
            document.getElementById('admin_email').value = '';
            document.getElementById('support_contact').value = '';
            document.getElementById('theme_select').selectedIndex = 0;
            alert('Settings reset to defaults.');
        }
    </script>
</body>
</html>
